<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<meta name="theme-color" content="black" />
		<meta name="description" content="AI-powered code generation and review." />
		<meta name="robots" content="index, follow" data-prerender-robots />
		<link rel="icon" type="image/svg+xml" href="/favicon.svg" />
		<link rel="preconnect" href="https://fonts.googleapis.com" />
		<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
		<link
			href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&family=Geist+Mono:wght@100..900&display=swap"
			rel="stylesheet"
		/>
		<script>
			(() => {
				try {
					const theme = localStorage.getItem("codeforge-theme") || "system";
					const prefersDark = window.matchMedia(
						"(prefers-color-scheme: dark)",
					).matches;
					document.documentElement.classList.toggle(
						"dark",
						theme === "dark" || (theme === "system" && prefersDark),
					);
				} catch {
					// Ignore storage access errors and let React apply the default theme.
				}
			})();
		</script>
		<title>Codeforge</title>
	</head>
	<body class="antialiased font-sans px-4 lg:px-0 overflow-x-hidden">
		<div id="root"><!--app-html--></div>
		<script type="module" src="/src/main.tsx"></script>
	</body>
</html>
